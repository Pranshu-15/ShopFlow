server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves service names dynamically per request
    resolver 127.0.0.11 valid=30s;

    # Proxy API calls to backend services.
    # Using variables in proxy_pass forces per-request DNS resolution so
    # container IP changes (restarts) never cause stale-IP failures.
    location /api/v1/catalog {
        set $catalog "http://catalog-service:8082";
        proxy_pass         $catalog;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        client_max_body_size 5m;
    }
    location /api/v1/users {
        set $users "http://user-service:8081";
        proxy_pass         $users;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location /api/v1/cart {
        set $cart "http://cart-service:8083";
        proxy_pass         $cart;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location /api/v1/orders {
        set $orders "http://order-service:8085";
        proxy_pass         $orders;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location /api/v1/payments {
        set $payments "http://payment-service:8084";
        proxy_pass         $payments;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # React Router — serve index.html for any path that isn't a static file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
