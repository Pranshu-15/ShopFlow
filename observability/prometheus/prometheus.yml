global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: shopflow
    env:     local

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot services — use host.docker.internal so Prometheus (in Docker)
  # can reach services running on the host. In a full docker-compose deployment
  # (Phase 12) replace host.docker.internal with the compose service names.

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: user-service

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: catalog-service

  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: cart-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: payment-service

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: order-service

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8086']
        labels:
          service: notification-service
