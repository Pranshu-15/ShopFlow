<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${eventType == 'ORDER_CONFIRMED'} ? 'Order Confirmed' : 'Order Received'">Order</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { background: #fff; border-radius: 8px; padding: 32px; max-width: 540px; margin: auto; }
        .header { color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 16px; margin-bottom: 24px; }
        .detail { margin: 12px 0; color: #555; }
        .label { font-weight: bold; color: #333; }
        .footer { margin-top: 32px; font-size: 12px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2 th:text="${eventType == 'ORDER_CONFIRMED'} ? '✓ Your Order is Confirmed!' : '📦 Order Received'">
            Order Update
        </h2>
        <p>Thank you for shopping with ShopFlow.</p>
    </div>

    <div class="detail">
        <span class="label">Order ID:</span>
        <span th:text="${orderId}">—</span>
    </div>
    <div class="detail" th:if="${amount != null}">
        <span class="label">Amount:</span>
        <span th:text="${currency + ' ' + amount}">—</span>
    </div>
    <div class="detail">
        <span class="label">Status:</span>
        <span th:text="${eventType == 'ORDER_CONFIRMED'} ? 'Confirmed' : 'Processing'">Processing</span>
    </div>

    <p style="margin-top: 24px;">
        If you have any questions, please contact our support team.
    </p>

    <div class="footer">
        &copy; ShopFlow. All rights reserved.
    </div>
</div>
</body>
</html>
