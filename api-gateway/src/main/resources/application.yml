server:
  port: 8000

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@userKeyResolver}"
      routes:
        # Authentication & Keycloak Proxy Route
        - id: keycloak-service
          uri: ${KEYCLOAK_URI:http://localhost:8080}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /realms/shopflow-realm/protocol/openid-connect/${segment}

        # User Service Route
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**

        # Catalog Service Route
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/catalog/**

        # Cart Service Route
        - id: cart-service
          uri: ${CART_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/cart/**

        # Order Service Route
        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/orders/**

        # Payment Service Route
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/payments/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/shopflow-realm}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/realms/shopflow-realm/protocol/openid-connect/certs}

# Spring Boot Actuator Monitoring configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
