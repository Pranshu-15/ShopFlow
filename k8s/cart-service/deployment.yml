apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: shopflow
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: shopflow/cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: shopflow-config
            - secretRef:
                name: shopflow-secrets
          resources:
            requests:
              memory: 192Mi
              cpu: 200m
            limits:
              memory: 384Mi
              cpu: 400m
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
