apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: shopflow
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: shopflow/catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: shopflow-config
            - secretRef:
                name: shopflow-secrets
          env:
            - name: DB_NAME
              value: catalogservice_db
            - name: OPENSEARCH_HOST
              value: opensearch
            - name: OPENSEARCH_PORT
              value: "9200"
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
